<?xml version="1.0" encoding="UTF-8"?>
<!-- Option B : Verre de vin rouge sur fond bordeaux avec reflets -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B2D42"/>
      <stop offset="100%" stop-color="#3D0F1E"/>
    </linearGradient>
    <linearGradient id="glass-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d0e8f0" stop-opacity="0.6"/>
      <stop offset="45%" stop-color="#f0f8ff" stop-opacity="0.9"/>
      <stop offset="75%" stop-color="#b8d8e8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#90c0d8" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="wine-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C0364A"/>
      <stop offset="100%" stop-color="#7B0F26"/>
    </linearGradient>
    <linearGradient id="stem-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cce8f4" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#f0f8ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a8d0e0" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)"/>

  <!-- Reflet subtil en haut à gauche -->
  <ellipse cx="180" cy="140" rx="80" ry="50" fill="#ffffff" opacity="0.06"/>

  <!-- ── Verre ── -->

  <!-- Vin (fond coloré visible à travers le verre) -->
  <path d="M 158 148 Q 156 200 160 240 Q 170 290 190 320 L 322 320 Q 342 290 352 240 Q 356 200 354 148 Z"
        fill="url(#wine-fill)" opacity="0.9"/>

  <!-- Surface du vin (reflet lumineux) -->
  <ellipse cx="256" cy="148" rx="98" ry="14" fill="#E05070" opacity="0.5"/>
  <ellipse cx="240" cy="146" rx="40" ry="6" fill="#ffffff" opacity="0.3"/>

  <!-- Paroi du verre (avant, transparent) -->
  <path d="M 156 130 Q 152 200 158 250 Q 168 305 196 340 L 232 355 L 232 415 L 200 425 L 200 435 L 312 435 L 312 425 L 280 415 L 280 355 L 316 340 Q 344 305 354 250 Q 360 200 356 130 Z"
        fill="url(#glass-grad)"/>

  <!-- Contour du verre -->
  <path d="M 156 130 Q 152 200 158 250 Q 168 305 196 340 L 232 355"
        fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.5"/>
  <path d="M 356 130 Q 360 200 354 250 Q 344 305 316 340 L 280 355"
        fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.3"/>

  <!-- Tige -->
  <rect x="247" y="355" width="18" height="63" rx="4" fill="url(#stem-grad)"/>

  <!-- Pied -->
  <ellipse cx="256" cy="428" rx="78" ry="11" fill="url(#stem-grad)" opacity="0.85"/>
  <!-- Reflet pied -->
  <ellipse cx="238" cy="425" rx="30" ry="4" fill="#ffffff" opacity="0.25"/>

  <!-- Reflet latéral gauche sur la coupe -->
  <path d="M 165 155 Q 162 200 166 245 Q 172 280 184 308"
        fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- Petites bulles dans le vin -->
  <circle cx="210" cy="240" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="240" cy="270" r="2" fill="#ffffff" opacity="0.25"/>
  <circle cx="290" cy="220" r="2.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="275" cy="260" r="2" fill="#ffffff" opacity="0.25"/>

  <!-- Étoile / brillance en haut du verre -->
  <circle cx="185" cy="142" r="4" fill="#ffffff" opacity="0.6" filter="url(#glow)"/>
</svg>
