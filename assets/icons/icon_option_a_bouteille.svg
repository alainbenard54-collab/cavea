<?xml version="1.0" encoding="UTF-8"?>
<!-- Option A : Bouteille de vin bordeaux stylisée sur fond carré arrondi -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fond carré arrondi bordeaux profond -->
  <rect width="512" height="512" rx="96" fill="#5C1A28"/>

  <!-- Ombre douce interne -->
  <rect width="512" height="512" rx="96" fill="url(#bg-gradient)" opacity="0.3"/>

  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="bottle-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8C5A0"/>
      <stop offset="40%" stop-color="#F5E6D0"/>
      <stop offset="70%" stop-color="#E0B890"/>
      <stop offset="100%" stop-color="#C89A6A"/>
    </linearGradient>
    <linearGradient id="wine-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B1A3A"/>
      <stop offset="100%" stop-color="#5C0F26"/>
    </linearGradient>
    <linearGradient id="capsule-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A24A"/>
      <stop offset="100%" stop-color="#8A6E2A"/>
    </linearGradient>
  </defs>

  <!-- Corps de la bouteille (verre) -->
  <!-- Épaules -->
  <path d="M 200 220 Q 180 260 175 300 L 175 420 Q 175 445 200 445 L 312 445 Q 337 445 337 420 L 337 300 Q 332 260 312 220 Z"
        fill="url(#bottle-gradient)" />

  <!-- Reflet sur le verre -->
  <path d="M 200 230 Q 184 265 181 305 L 181 420 Q 181 438 200 438 L 210 438 L 210 305 Q 207 265 218 230 Z"
        fill="#ffffff" opacity="0.25"/>

  <!-- Vin à l'intérieur (visible par transparence simulée) -->
  <path d="M 183 330 L 183 415 Q 183 438 200 438 L 312 438 Q 329 438 329 415 L 329 330 Z"
        fill="url(#wine-gradient)" opacity="0.85"/>

  <!-- Col de la bouteille -->
  <rect x="222" y="148" width="68" height="75" rx="8" fill="url(#bottle-gradient)"/>

  <!-- Reflet sur le col -->
  <rect x="228" y="155" width="14" height="60" rx="4" fill="#ffffff" opacity="0.2"/>

  <!-- Goulot -->
  <rect x="236" y="100" width="40" height="52" rx="6" fill="url(#bottle-gradient)"/>

  <!-- Capsule (dorée) -->
  <rect x="228" y="90" width="56" height="40" rx="5" fill="url(#capsule-gradient)"/>
  <!-- Détail capsule -->
  <rect x="228" y="118" width="56" height="6" rx="2" fill="#6A4E1A" opacity="0.6"/>

  <!-- Étiquette -->
  <rect x="186" y="285" width="140" height="110" rx="6" fill="#FAFAF0" opacity="0.95"/>
  <!-- Bord étiquette -->
  <rect x="186" y="285" width="140" height="110" rx="6" fill="none" stroke="#C4A24A" stroke-width="2"/>

  <!-- Ligne décorative étiquette -->
  <line x1="196" y1="305" x2="326" y2="305" stroke="#C4A24A" stroke-width="1.5"/>
  <line x1="196" y1="378" x2="326" y2="378" stroke="#C4A24A" stroke-width="1.5"/>

  <!-- Texte simulé sur étiquette (barres horizontales) -->
  <rect x="210" y="315" width="92" height="8" rx="3" fill="#5C1A28" opacity="0.7"/>
  <rect x="218" y="330" width="76" height="6" rx="2" fill="#5C1A28" opacity="0.4"/>
  <rect x="220" y="342" width="72" height="5" rx="2" fill="#5C1A28" opacity="0.3"/>
  <rect x="215" y="358" width="82" height="6" rx="2" fill="#5C1A28" opacity="0.4"/>

  <!-- Petite grappe de raisin sur l'étiquette -->
  <circle cx="256" cy="355" r="0" fill="#7B2D42"/>
</svg>
